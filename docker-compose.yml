services:
  db:
    image: postgres:16-alpine
    container_name: estoque-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: estoque
      POSTGRES_PASSWORD: estoque123
      POSTGRES_DB: estoque_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estoque -d estoque_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: estoque-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://estoque:estoque123@db:5432/estoque_db?schema=public
      API_PORT: 3001
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars!}
      CORS_ORIGIN: http://localhost:8888,http://127.0.0.1:8888
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: estoque-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8888:80"

volumes:
  postgres_data:
  uploads_data:
  backups_data:
